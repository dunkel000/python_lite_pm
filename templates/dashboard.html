{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}
{% block header_title %}Dashboard de proyectos{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Stats cards -->
  <div id="stats-container">
    {% include "partials/stats_cards.html" %}
  </div>

  <!-- Toolbar -->
  <div class="bg-card border border-border overflow-hidden">
    <div class="px-5 py-4 flex flex-wrap items-center gap-3 border-b border-border">
      <div class="flex-1">
        <p class="am-label">Selected work</p>
        <h2 class="am-section-title mt-1">Proyectos</h2>
      </div>

      <!-- Filters -->
      <div class="flex items-center gap-2 flex-wrap">
        <select id="filter-status" name="status"
                hx-get="/partials/project-table"
                hx-target="#project-table-container"
                hx-include="#filter-status,#filter-priority,#filter-user,#filter-tag,#show-completed"
                hx-trigger="change"
                class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          <option value="">Todos los estados</option>
          <option value="Backlog">Backlog</option>
          <option value="Pendiente">Pendiente</option>
          <option value="En Progreso">En Progreso</option>
          <option value="Bloqueado">Bloqueado</option>
          <option value="Completado">Completado</option>
        </select>

        <select id="filter-priority" name="priority"
                hx-get="/partials/project-table"
                hx-target="#project-table-container"
                hx-include="#filter-status,#filter-priority,#filter-user,#filter-tag,#show-completed"
                hx-trigger="change"
                class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          <option value="">Todas las prioridades</option>
          <option value="Alta">Alta</option>
          <option value="Media">Media</option>
          <option value="Baja">Baja</option>
        </select>

        <select id="filter-user" name="assigned_user_id"
                hx-get="/partials/project-table"
                hx-target="#project-table-container"
                hx-include="#filter-status,#filter-priority,#filter-user,#filter-tag,#show-completed"
                hx-trigger="change"
                class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          <option value="">Todos los responsables</option>
          {% for u in users %}
          <option value="{{ u.id }}">{{ u.name }}</option>
          {% endfor %}
        </select>

        <select id="filter-tag" name="tag_id"
                hx-get="/partials/project-table"
                hx-target="#project-table-container"
                hx-include="#filter-status,#filter-priority,#filter-user,#filter-tag,#show-completed"
                hx-trigger="change"
                class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          <option value="">Todas las etiquetas</option>
          {% for t in tags %}
          <option value="{{ t.id }}">{{ t.name }}</option>
          {% endfor %}
        </select>

        <input type="hidden" id="show-completed" name="show_completed" value="0">
        <button id="show-completed-toggle"
                type="button"
                hx-get="/partials/project-table"
                hx-target="#project-table-container"
                hx-include="#filter-status,#filter-priority,#filter-user,#filter-tag,#show-completed"
                hx-on:click="
                  const input = document.getElementById('show-completed');
                  const active = input.value === '1';
                  input.value = active ? '0' : '1';
                  this.textContent = active ? 'Ver completados' : 'Ocultar completados';
                  this.classList.toggle('bg-muted', !active);
                  this.classList.toggle('text-foreground', !active);
                "
                class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-muted-foreground hover:text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          Ver completados
        </button>
      </div>

      <!-- New project button -->
      <button hx-get="/partials/project-form"
              hx-target="#modal-content"
              hx-swap="innerHTML"
              class="am-btn">
        <span aria-hidden="true">+</span>
        Nuevo proyecto
      </button>
    </div>

    <!-- Project table -->
    <div id="project-table-container" class="bg-card">
      {% include "partials/project_table.html" %}
    </div>
  </div>

</div>
{% endblock %}
