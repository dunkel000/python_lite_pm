{% if users %}
<div class="overflow-x-auto">
  <table class="w-full text-left border-collapse">
    <thead>
      <tr class="border-b border-border bg-muted/50">
        <th class="px-6 py-4 text-xs font-bold text-muted-foreground uppercase tracking-widest">Nombre</th>
        <th class="px-6 py-4 text-xs font-bold text-muted-foreground uppercase tracking-widest">Email corporativo</th>
        <th class="px-6 py-4 text-xs font-bold text-muted-foreground uppercase tracking-widest">Creado</th>
        <th class="px-6 py-4 text-xs font-bold text-muted-foreground uppercase tracking-widest text-right">Acciones</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-border/50 bg-card">
      {% for u in users %}
      <tr class="hover:bg-muted/30 transition-colors group">
        <td class="px-6 py-4 text-sm font-semibold text-foreground">{{ u.name }}</td>
        <td class="px-6 py-4 text-sm text-foreground">
          <a href="mailto:{{ u.email }}" class="hover:underline">{{ u.email }}</a>
        </td>
        <td class="px-6 py-4 text-xs text-muted-foreground">
          {{ u.created_at[:10] if u.created_at else '—' }}
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-right">
          <div class="flex items-center justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button hx-get="/partials/user-form?id={{ u.id }}"
                    hx-target="#modal-content"
                    title="Editar"
                    class="p-1.5 rounded-md text-muted-foreground hover:text-primary hover:bg-primary/10 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button hx-delete="/users/{{ u.id }}"
                    hx-target="#user-table-container"
                    hx-swap="innerHTML"
                    hx-confirm="¿Eliminar a {{ u.name }}? Los proyectos asignados quedarán sin responsable."
                    title="Eliminar"
                    class="p-1.5 rounded-md text-muted-foreground hover:text-destructive hover:bg-destructive/10 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="px-5 py-16 text-center border-2 border-dashed border-border rounded-xl bg-card/50">
  <p class="text-sm font-medium text-muted-foreground">Aún no hay usuarios. Crea el primero con el botón "Nuevo Usuario".</p>
</div>
{% endif %}
