{% if decisions %}
  <div class="space-y-3 mb-4">
    {% for d in decisions %}
    <div x-data="{editing:false}" class="bg-card border border-border p-4">
      <template x-if="!editing">
        <div>
          <p class="text-sm font-semibold text-foreground">{{ d.decision }}</p>
          {% if d.context %}
          <p class="text-xs text-muted-foreground mt-2 leading-relaxed italic">{{ d.context }}</p>
          {% endif %}
          <div class="flex items-center justify-between mt-4 pt-3 border-t border-border/50 gap-3">
            <span class="text-[10px] font-medium text-muted-foreground uppercase">Por: <span class="text-foreground">{{ d.decided_by or 'Sistema' }}</span></span>
            <div class="flex items-center gap-3">
              <span class="text-[10px] font-medium text-muted-foreground">{{ d.created_at[:10] }}</span>
              <button type="button"
                      @click="editing=true"
                      class="text-[10px] font-semibold uppercase tracking-wider text-primary hover:text-primary/80 transition-colors">
                Editar
              </button>
              <button type="button"
                      hx-delete="/projects/{{ project_id }}/decisions/{{ d.id }}"
                      hx-target="#decisions-list-{{ project_id }}"
                      hx-swap="innerHTML"
                      hx-confirm="¿Eliminar esta decisión? Esta acción no se puede deshacer."
                      class="text-[10px] font-semibold uppercase tracking-wider text-destructive hover:text-destructive/80 transition-colors">
                Eliminar
              </button>
            </div>
          </div>
        </div>
      </template>

      <template x-if="editing">
        <form hx-put="/projects/{{ project_id }}/decisions/{{ d.id }}"
              hx-target="#decisions-list-{{ project_id }}"
              hx-swap="innerHTML"
              class="space-y-3">
          <input type="text"
                 name="decision"
                 value="{{ d.decision }}"
                 required
                 class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all" />
          <textarea name="context"
                    rows="2"
                    class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all resize-none">{{ d.context or '' }}</textarea>
          <div class="flex flex-col md:flex-row gap-3">
            <input type="text"
                   name="decided_by"
                   value="{{ d.decided_by or '' }}"
                   placeholder="Decidido por"
                   class="flex-1 text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all" />
            <div class="flex gap-2">
              <button type="button"
                      @click="editing=false"
                      class="am-btn am-btn--ghost">
                Cancelar
              </button>
              <button type="submit"
                      class="am-btn">
                Guardar
              </button>
            </div>
          </div>
        </form>
      </template>
    </div>
    {% endfor %}
  </div>
{% else %}
  <div class="py-10 text-center border border-dashed border-border mb-4">
    <p class="text-sm text-muted-foreground mb-3">Sin decisiones registradas.</p>
  </div>
{% endif %}
