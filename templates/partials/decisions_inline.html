{% if decisions %}
  <div class="space-y-3 mb-4">
    {% for d in decisions %}
    <div class="bg-card border border-border rounded-lg p-4 shadow-sm">
      <p class="text-sm font-semibold text-foreground">{{ d.decision }}</p>
      {% if d.context %}
      <p class="text-xs text-muted-foreground mt-2 leading-relaxed italic">{{ d.context }}</p>
      {% endif %}
      <div class="flex items-center justify-between mt-4 pt-3 border-t border-border/50">
        <span class="text-[10px] font-medium text-muted-foreground uppercase">Por: <span class="text-foreground">{{ d.decided_by or 'Sistema' }}</span></span>
        <span class="text-[10px] font-medium text-muted-foreground">{{ d.created_at[:10] }}</span>
      </div>
    </div>
    {% endfor %}
  </div>
{% else %}
  <div class="py-10 text-center border border-dashed border-border rounded-lg mb-4">
    <p class="text-sm text-muted-foreground mb-3">Sin decisiones registradas.</p>
  </div>
{% endif %}
