<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
  <!-- Total -->
  <div class="bg-card p-5 border border-border flex items-start gap-4">
    <div class="p-3 bg-secondary text-secondary-foreground">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
    </div>
    <div class="flex-1">
      <p class="am-stat-label">Total proyectos</p>
      <p class="am-stat-value">{{ stats.total }}</p>
    </div>
  </div>

  <!-- En Progreso -->
  <div class="bg-card p-5 border border-border flex items-start gap-4">
    <div class="p-3 bg-secondary text-secondary-foreground">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <div class="flex-1">
      <p class="am-stat-label">En progreso</p>
      <p class="am-stat-value">{{ stats.en_progreso }}</p>
    </div>
  </div>

  <!-- Bloqueados -->
  <div class="bg-card p-5 border border-border flex items-start gap-4">
    <div class="p-3 bg-secondary text-secondary-foreground">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    <div class="flex-1">
      <p class="am-stat-label">Bloqueados</p>
      <p class="am-stat-value">{{ stats.bloqueados }}</p>
    </div>
  </div>

  <!-- Completados Mes -->
  <div class="bg-card p-5 border border-border flex items-start gap-4">
    <div class="p-3 bg-foreground text-background">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div class="flex-1">
      <p class="am-stat-label">Completados (mes)</p>
      <p class="am-stat-value">{{ stats.completados_mes }}</p>
    </div>
  </div>
</div>
