{% set is_edit = project is defined and project %}
<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold text-foreground">
      {% if is_edit %}Editar Proyecto{% else %}Nuevo Proyecto{% endif %}
    </h2>
    <button onclick="closeModal()" class="text-muted-foreground hover:text-foreground transition-colors p-1 rounded-md hover:bg-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form {% if is_edit %}
          hx-put="/projects/{{ project.id }}"
        {% else %}
          hx-post="/projects"
        {% endif %}
        hx-target="#project-table-container"
        hx-swap="innerHTML"
        hx-on::after-request="
          if(event.detail.successful){
            closeModal();
            htmx.ajax('GET','/partials/stats',{target:'#stats-container'});
          }
        "
        class="space-y-5">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- ID -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">ID del Proyecto</label>
        <input type="text" name="id"
               value="{{ project.id if is_edit else next_id }}"
               {% if is_edit %}readonly{% endif %}
               placeholder="DEV-001"
               class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all {% if is_edit %}bg-muted text-muted-foreground cursor-not-allowed{% endif %}"
               required />
      </div>
      <!-- Owner -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Responsable</label>
        <input type="text" name="owner"
               value="{{ project.owner if is_edit else '' }}"
               placeholder="Diego"
               class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all" />
      </div>
    </div>

    <!-- Name -->
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Nombre del Proyecto <span class="text-destructive">*</span></label>
      <input type="text" name="name"
             value="{{ project.name if is_edit else '' }}"
             placeholder="Nombre del proyecto"
             class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all"
             required />
    </div>

    <!-- Description -->
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Descripción</label>
      <textarea name="description" rows="3"
                placeholder="Descripción del proyecto y objetivos principales"
                class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all resize-none">{{ project.description if is_edit else '' }}</textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Priority -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Prioridad</label>
        <select name="priority"
                class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          {% for opt in ['Alta', 'Media', 'Baja'] %}
          <option value="{{ opt }}" {% if is_edit and project.priority == opt %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
      <!-- Status -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Estado</label>
        <select name="status"
                class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
          {% for opt in ['Backlog', 'Pendiente', 'En Progreso', 'Bloqueado', 'Completado'] %}
          <option value="{{ opt }}" {% if is_edit and project.status == opt %}selected{% elif not is_edit and opt == 'Backlog' %}selected{% endif %}>{{ opt }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- Start date -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Fecha inicio</label>
        <input type="date" name="start_date"
               value="{{ project.start_date if is_edit else '' }}"
               class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all" />
      </div>
      <!-- End date -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">Fecha límite</label>
        <input type="date" name="end_date"
               value="{{ project.end_date if is_edit else '' }}"
               class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all" />
      </div>
      <!-- Percent -->
      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5 uppercase tracking-wider">% Avance</label>
        <input type="number" name="percent_complete" min="0" max="100"
               value="{{ project.percent_complete if is_edit else 0 }}"
               class="w-full text-sm border border-input rounded-md px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all" />
      </div>
    </div>

    <div class="flex flex-col-reverse md:flex-row gap-3 pt-4 border-t border-border">
      <button type="button" onclick="closeModal()"
              class="flex-1 px-4 py-2 text-sm font-medium text-foreground bg-secondary hover:bg-secondary/80 rounded-md transition-colors border border-border">
        Cancelar
      </button>
      <button type="submit"
              class="flex-1 bg-primary hover:bg-primary/90 text-primary-foreground text-sm font-medium py-2 rounded-md transition-shadow shadow-sm">
        {% if is_edit %}Guardar cambios{% else %}Crear proyecto{% endif %}
      </button>
    </div>
  </form>
</div>
