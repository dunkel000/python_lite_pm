<div class="p-6 space-y-5">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-base font-bold text-foreground">
      {% if ref %}Editar Referencia{% else %}Nueva Referencia{% endif %}
    </h2>
    <button onclick="closeModal()" class="text-muted-foreground hover:text-foreground transition-all p-1.5 rounded-md hover:bg-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <form {% if ref %}
        hx-put="/references/{{ ref.id }}"
        {% else %}
        hx-post="/references"
        {% endif %}
        hx-target="#ref-grid-container"
        hx-swap="innerHTML"
        hx-on::after-request="closeModal()"
        class="space-y-4">

    <!-- Type -->
    <div>
      <label class="form-label">Tipo *</label>
      <div class="flex gap-2">
        {% for t, label in [('paper','Paper'), ('book','Book'), ('chapter','Chapter')] %}
        <label class="ref-type-radio">
          <input type="radio" name="ref_type" value="{{ t }}"
                 {% if ref and ref.type == t %}checked{% elif not ref and t == 'paper' %}checked{% endif %}
                 class="sr-only peer">
          <span class="ref-type-radio-label peer-checked:bg-primary peer-checked:text-primary-foreground">{{ label }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <!-- Title -->
    <div>
      <label class="form-label" for="rf-title">Título *</label>
      <input id="rf-title" type="text" name="title" required
             value="{{ ref.title if ref else '' }}"
             placeholder="Título del documento"
             class="form-input w-full" />
    </div>

    <!-- Authors -->
    <div>
      <label class="form-label" for="rf-authors">Autores</label>
      <input id="rf-authors" type="text" name="authors"
             value="{{ ref.authors if ref else '' }}"
             placeholder="Ej: Fama, E. F., French, K. R."
             class="form-input w-full" />
    </div>

    <!-- Year + Journal/Publisher -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="rf-year">Año</label>
        <input id="rf-year" type="number" name="year" min="1600" max="2099"
               value="{{ ref.year if ref else '' }}"
               placeholder="2024"
               class="form-input w-full" />
      </div>
      <div>
        <label class="form-label" for="rf-journal">Journal / Editorial</label>
        <input id="rf-journal" type="text" name="journal"
               value="{{ ref.journal if ref else '' }}"
               placeholder="Journal of Finance…"
               class="form-input w-full" />
      </div>
    </div>

    <!-- Publisher -->
    <div>
      <label class="form-label" for="rf-publisher">Editorial (solo libro)</label>
      <input id="rf-publisher" type="text" name="publisher"
             value="{{ ref.publisher if ref else '' }}"
             placeholder="MIT Press, Wiley…"
             class="form-input w-full" />
    </div>

    <!-- Abstract -->
    <div>
      <label class="form-label" for="rf-abstract">Abstract / Resumen</label>
      <textarea id="rf-abstract" name="abstract" rows="4"
                placeholder="Resumen del contenido…"
                class="form-input w-full resize-none">{{ ref.abstract if ref else '' }}</textarea>
    </div>

    <!-- DOI + URL -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label" for="rf-doi">DOI</label>
        <input id="rf-doi" type="text" name="doi"
               value="{{ ref.doi if ref else '' }}"
               placeholder="10.xxxx/xxxxx"
               class="form-input w-full" />
      </div>
      <div>
        <label class="form-label" for="rf-url">URL</label>
        <input id="rf-url" type="url" name="url"
               value="{{ ref.url if ref else '' }}"
               placeholder="https://…"
               class="form-input w-full" />
      </div>
    </div>

    <!-- Tags -->
    <div>
      <label class="form-label" for="rf-tags">Tags</label>
      <input id="rf-tags" type="text" name="tags"
             value="{{ ref.tags if ref else '' }}"
             placeholder="#finance #markovprocess author:Fama"
             class="form-input w-full" />
      <p class="text-[10px] text-muted-foreground mt-1">Separa con espacios. Usa #tema, author:Nombre, etc.</p>
    </div>

    <!-- Submit -->
    <div class="flex justify-end gap-3 pt-2 border-t border-border">
      <button type="button" onclick="closeModal()"
              class="px-4 py-2 text-sm font-medium bg-secondary hover:bg-secondary/80 text-foreground border border-border rounded-md transition-colors">
        Cancelar
      </button>
      <button type="submit"
              class="px-6 py-2 bg-primary hover:bg-primary/90 text-primary-foreground text-sm font-bold rounded-md transition-all shadow-sm">
        {% if ref %}Guardar cambios{% else %}Agregar referencia{% endif %}
      </button>
    </div>
  </form>
</div>
