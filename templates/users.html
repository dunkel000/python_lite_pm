{% extends "base.html" %}

{% block title %}Usuarios{% endblock %}
{% block header_title %}Usuarios{% endblock %}

{% block content %}
<div class="space-y-6">

  <div class="bg-card border border-border overflow-hidden">
    <div class="px-5 py-4 flex flex-wrap items-center gap-3 border-b border-border bg-muted/50">
      <h2 class="text-sm font-semibold text-foreground flex-1">Miembros del equipo</h2>

      <button hx-get="/partials/user-form"
              hx-target="#modal-content"
              hx-swap="innerHTML"
              class="am-btn">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Nuevo Usuario
      </button>
    </div>

    <div id="user-table-container" class="bg-card">
      {% include "partials/user_table.html" %}
    </div>
  </div>

</div>
{% endblock %}
