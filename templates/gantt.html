{% extends "base.html" %}

{% block title %}Gantt{% endblock %}
{% block header_title %}Vista Gantt{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Filters -->
  <div class="bg-card rounded-lg border border-border shadow-sm px-5 py-4 flex flex-wrap items-center gap-3">
    <span class="text-sm font-semibold text-foreground flex-1">Línea de tiempo <span class="text-muted-foreground font-normal ml-2">— 16 semanas</span></span>

    <div class="flex items-center gap-2">
      <select id="gantt-status" name="status"
              hx-get="/partials/gantt-chart"
              hx-target="#gantt-container"
              hx-swap="innerHTML"
              hx-include="#gantt-status,#gantt-priority"
              hx-trigger="change"
              class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
        <option value="" {% if not filter_status %}selected{% endif %}>Todos los estados</option>
        {% for s in ['Backlog','Pendiente','En Progreso','Bloqueado','Completado'] %}
        <option value="{{ s }}" {% if filter_status == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>

      <select id="gantt-priority" name="priority"
              hx-get="/partials/gantt-chart"
              hx-target="#gantt-container"
              hx-swap="innerHTML"
              hx-include="#gantt-status,#gantt-priority"
              hx-trigger="change"
              class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
        <option value="" {% if not filter_priority %}selected{% endif %}>Todas las prioridades</option>
        {% for p in ['Alta','Media','Baja'] %}
        <option value="{{ p }}" {% if filter_priority == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <!-- Gantt chart -->
  <div id="gantt-container" class="bg-card rounded-lg border border-border shadow-sm overflow-hidden">
    {% include "partials/gantt_chart.html" %}
  </div>

  <!-- Legend -->
  <div class="flex flex-wrap gap-6 text-[10px] font-bold text-muted-foreground uppercase tracking-widest px-1">
    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-secondary border border-border"></span>Backlog</span>
    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-secondary border border-border"></span>Pendiente</span>
    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-primary/70"></span>En Progreso</span>
    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-destructive/70"></span>Bloqueado</span>
    <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-primary"></span>Completado</span>
  </div>

</div>
{% endblock %}
