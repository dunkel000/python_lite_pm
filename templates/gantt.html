{% extends "base.html" %}

{% block title %}Gantt{% endblock %}
{% block header_title %}Vista Gantt{% endblock %}

{% block content %}
<div class="space-y-6">

  <!-- Filters -->
  <div class="bg-card border border-border px-5 py-4 flex flex-wrap items-center gap-3">
    <div class="flex-1">
      <p class="am-label">Timeline</p>
      <h2 class="am-section-title mt-1">Línea de tiempo <span class="text-muted-foreground font-normal ml-2 text-sm">— 16 semanas</span></h2>
    </div>

    <div class="flex items-center gap-2 flex-wrap">
      <select id="gantt-status" name="status"
              hx-get="/partials/gantt-chart"
              hx-target="#gantt-container"
              hx-swap="innerHTML"
              hx-include="#gantt-status,#gantt-priority,#gantt-user,#gantt-tag"
              hx-trigger="change"
              class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
        <option value="" {% if not filter_status %}selected{% endif %}>Todos los estados</option>
        {% for s in ['Backlog','Pendiente','En Progreso','Bloqueado','Completado'] %}
        <option value="{{ s }}" {% if filter_status == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>

      <select id="gantt-priority" name="priority"
              hx-get="/partials/gantt-chart"
              hx-target="#gantt-container"
              hx-swap="innerHTML"
              hx-include="#gantt-status,#gantt-priority,#gantt-user,#gantt-tag"
              hx-trigger="change"
              class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
        <option value="" {% if not filter_priority %}selected{% endif %}>Todas las prioridades</option>
        {% for p in ['Alta','Media','Baja'] %}
        <option value="{{ p }}" {% if filter_priority == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>

      <select id="gantt-user" name="assigned_user_id"
              hx-get="/partials/gantt-chart"
              hx-target="#gantt-container"
              hx-swap="innerHTML"
              hx-include="#gantt-status,#gantt-priority,#gantt-user,#gantt-tag"
              hx-trigger="change"
              class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
        <option value="" {% if not filter_user %}selected{% endif %}>Todos los responsables</option>
        {% for u in users %}
        <option value="{{ u.id }}" {% if filter_user == u.id|string %}selected{% endif %}>{{ u.name }}</option>
        {% endfor %}
      </select>

      <select id="gantt-tag" name="tag_id"
              hx-get="/partials/gantt-chart"
              hx-target="#gantt-container"
              hx-swap="innerHTML"
              hx-include="#gantt-status,#gantt-priority,#gantt-user,#gantt-tag"
              hx-trigger="change"
              class="text-sm border border-input rounded-md px-3 py-1.5 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-1 transition-all">
        <option value="" {% if not filter_tag %}selected{% endif %}>Todas las etiquetas</option>
        {% for t in tags %}
        <option value="{{ t.id }}" {% if filter_tag == t.id|string %}selected{% endif %}>{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <!-- Gantt chart -->
  <div id="gantt-container" class="bg-card border border-border overflow-hidden">
    {% include "partials/gantt_chart.html" %}
  </div>

  <!-- Legend -->
  <div class="flex flex-wrap gap-3 px-1">
    <span class="status-pill status-pill--backlog">Backlog</span>
    <span class="status-pill status-pill--pendiente">Pendiente</span>
    <span class="status-pill status-pill--en-progreso">En Progreso</span>
    <span class="status-pill status-pill--bloqueado">Bloqueado</span>
    <span class="status-pill status-pill--completado">Completado</span>
  </div>

</div>
{% endblock %}
