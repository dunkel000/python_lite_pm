<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Project Tracker{% endblock %} — Activos Privados</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: "hsl(var(--border) / <alpha-value>)",
            input: "hsl(var(--input) / <alpha-value>)",
            ring: "hsl(var(--ring) / <alpha-value>)",
            background: "hsl(var(--background) / <alpha-value>)",
            foreground: "hsl(var(--foreground) / <alpha-value>)",
            primary: {
              DEFAULT: "hsl(var(--primary) / <alpha-value>)",
              foreground: "hsl(var(--primary-foreground) / <alpha-value>)",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary) / <alpha-value>)",
              foreground: "hsl(var(--secondary-foreground) / <alpha-value>)",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive) / <alpha-value>)",
              foreground: "hsl(var(--destructive-foreground) / <alpha-value>)",
            },
            muted: {
              DEFAULT: "hsl(var(--muted) / <alpha-value>)",
              foreground: "hsl(var(--muted-foreground) / <alpha-value>)",
            },
            accent: {
              DEFAULT: "hsl(var(--accent) / <alpha-value>)",
              foreground: "hsl(var(--accent-foreground) / <alpha-value>)",
            },
            popover: {
              DEFAULT: "hsl(var(--popover) / <alpha-value>)",
              foreground: "hsl(var(--popover-foreground) / <alpha-value>)",
            },
            card: {
              DEFAULT: "hsl(var(--card) / <alpha-value>)",
              foreground: "hsl(var(--card-foreground) / <alpha-value>)",
            },
          },
          fontFamily: {
            sans:    ['DM Sans', 'Helvetica Neue', 'sans-serif'],
            display: ['Space Grotesk', 'Helvetica Neue', 'sans-serif'],
            mono:    ['OCR-A', 'Courier New', 'Menlo', 'monospace'],
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "var(--radius)",
            sm: "var(--radius)",
          },
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="h-full flex bg-background text-foreground transition-colors duration-300" hx-boost="false">

  <!-- Sidebar -->
  <aside class="w-64 flex-shrink-0 flex flex-col border-r border-border bg-card">
    <div class="px-6 pt-7 pb-6 border-b border-border">
      <div class="flex items-baseline">
        <span class="am-monogram">MO</span>
        <span class="am-monogram-dot"></span>
      </div>
      <p class="am-label mt-4">Middle office</p>
      <p class="text-foreground text-sm mt-1 leading-snug">Activos privados</p>
    </div>
    <nav class="flex-1 px-3 py-5 space-y-0.5">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2 text-sm transition-colors
                {% if active_page == 'dashboard' %}bg-foreground text-background{% else %}text-muted-foreground hover:bg-accent hover:text-foreground{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="/gantt"
         class="flex items-center gap-3 px-3 py-2 text-sm transition-colors
                {% if active_page == 'gantt' %}bg-foreground text-background{% else %}text-muted-foreground hover:bg-accent hover:text-foreground{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Gantt
      </a>
      <a href="/decisiones"
         class="flex items-center gap-3 px-3 py-2 text-sm transition-colors
                {% if active_page == 'decisiones' %}bg-foreground text-background{% else %}text-muted-foreground hover:bg-accent hover:text-foreground{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Decisiones
      </a>
      <a href="/users"
         class="flex items-center gap-3 px-3 py-2 text-sm transition-colors
                {% if active_page == 'users' %}bg-foreground text-background{% else %}text-muted-foreground hover:bg-accent hover:text-foreground{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m10-5.13a4 4 0 11-8 0 4 4 0 018 0zm6 0a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Usuarios
      </a>
      <a href="/explorer"
         class="flex items-center gap-3 px-3 py-2 text-sm transition-colors
                {% if active_page == 'explorer' %}bg-foreground text-background{% else %}text-muted-foreground hover:bg-accent hover:text-foreground{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
        </svg>
        Explorador
      </a>
    </nav>
    <div class="px-6 py-4 border-t border-border">
      <p class="am-label">v2.0 — 2026</p>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-card border-b border-border px-6 py-5 flex items-center justify-between flex-shrink-0">
      <h1 class="font-display text-2xl font-semibold text-foreground tracking-tight">{% block header_title %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-4">
        <form method="post" action="/logout">
          <button type="submit" class="text-xs uppercase tracking-widest px-3 py-1.5 border border-border text-muted-foreground hover:text-background hover:bg-foreground hover:border-foreground transition-colors">
            Salir
          </button>
        </form>
        <button id="theme-toggle" class="p-2 hover:bg-accent text-muted-foreground transition-colors">
          <!-- Moon Icon -->
          <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
          </svg>
          <!-- Sun Icon -->
          <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
          </svg>
        </button>
        <div class="flex items-center gap-2 text-sm text-muted-foreground">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span id="current-date"></span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-auto p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay"
       class="fixed inset-0 bg-background/85 z-40 hidden items-center justify-center transition-all duration-200"
       x-data
       @keydown.escape.window="closeModal()"
       onclick="if(event.target===this){closeModal();}">
    <div id="modal-content" class="bg-card text-card-foreground border border-border w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto relative">
    </div>
  </div>

  <script>
    // Theme Toggle Logic
    const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
    const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

    // Change the icons inside the button based on previous settings
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        themeToggleLightIcon.classList.remove('hidden');
    } else {
        document.documentElement.classList.remove('dark');
        themeToggleDarkIcon.classList.remove('hidden');
    }

    const themeToggleBtn = document.getElementById('theme-toggle');

    themeToggleBtn.addEventListener('click', function() {
        // toggle icons inside button
        themeToggleDarkIcon.classList.toggle('hidden');
        themeToggleLightIcon.classList.toggle('hidden');

        // if set via local storage previously
        if (localStorage.getItem('color-theme')) {
            if (localStorage.getItem('color-theme') === 'light') {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            }

        // if NOT set via local storage previously
        } else {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }
    });

    // Display current date in header
    const d = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').textContent = d.toLocaleDateString('es-CL', opts);

    // Helper: open modal
    function openModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('hidden');
      overlay.classList.add('flex');
    }
    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('hidden');
      overlay.classList.remove('flex');
      document.getElementById('modal-content').innerHTML = '';
    }

    // HTMX: after swap into modal-content, open overlay
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'modal-content') {
        openModal();
      }
    });

    // HTMX: inject CSRF token as header on every mutating request
    document.body.addEventListener('htmx:configRequest', function(evt) {
      const method = (evt.detail.verb || '').toUpperCase();
      if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
        const pair = document.cookie.split('; ').find(function(row) { return row.startsWith('pm_csrf='); });
        if (pair) evt.detail.headers['X-CSRF-Token'] = pair.split('=').slice(1).join('=');
      }
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
