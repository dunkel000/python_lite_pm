<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Project Tracker{% endblock %} — Activos Privados</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: '#1B2A4A',
            'sidebar-hover': '#243659',
          }
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5ViYgSibmK" crossorigin="anonymous"></script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="h-full flex" hx-boost="false">

  <!-- Sidebar -->
  <aside class="w-56 flex-shrink-0 flex flex-col" style="background-color:#1B2A4A">
    <div class="px-6 py-5 border-b border-blue-900">
      <span class="text-white font-semibold text-base leading-tight">Middle Office</span>
      <p class="text-blue-300 text-xs mt-0.5">Activos Privados</p>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if active_page == 'dashboard' %}bg-blue-700 text-white{% else %}text-blue-200 hover:bg-sidebar-hover hover:text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="/gantt"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if active_page == 'gantt' %}bg-blue-700 text-white{% else %}text-blue-200 hover:bg-sidebar-hover hover:text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Gantt
      </a>
      <a href="/decisiones"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if active_page == 'decisiones' %}bg-blue-700 text-white{% else %}text-blue-200 hover:bg-sidebar-hover hover:text-white{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Decisiones
      </a>
    </nav>
    <div class="px-4 py-3 border-t border-blue-900">
      <p class="text-blue-400 text-xs">v1.0 — 2026</p>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
      <h1 class="text-lg font-semibold text-gray-800">{% block header_title %}Dashboard{% endblock %}</h1>
      <div class="flex items-center gap-2 text-sm text-gray-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <span id="current-date"></span>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-auto p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Modal overlay (used by HTMX to inject project forms / detail panels) -->
  <div id="modal-overlay"
       class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden items-center justify-center"
       x-data
       @keydown.escape.window="
         document.getElementById('modal-overlay').classList.add('hidden');
         document.getElementById('modal-overlay').classList.remove('flex');
         document.getElementById('modal-content').innerHTML = '';
       "
       onclick="if(event.target===this){this.classList.add('hidden');this.classList.remove('flex');document.getElementById('modal-content').innerHTML='';}">
    <div id="modal-content" class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto relative">
    </div>
  </div>

  <script>
    // Display current date in header
    const d = new Date();
    const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('current-date').textContent = d.toLocaleDateString('es-CL', opts);

    // Helper: open modal
    function openModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('hidden');
      overlay.classList.add('flex');
    }
    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('hidden');
      overlay.classList.remove('flex');
      document.getElementById('modal-content').innerHTML = '';
    }

    // HTMX: after swap into modal-content, open overlay
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.detail.target.id === 'modal-content') {
        openModal();
      }
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
