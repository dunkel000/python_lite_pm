<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Project Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-6"
      style="background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);">
  <div class="w-full max-w-sm border border-border p-8 space-y-7"
       style="background:hsl(var(--card));">

    <div>
      <div class="flex items-baseline">
        <span class="am-monogram">MO</span>
        <span class="am-monogram-dot"></span>
      </div>
      <p class="am-label mt-5">Project tracker</p>
      <h1 class="font-display text-2xl font-semibold tracking-tight mt-1">Acceso requerido</h1>
      <p class="text-sm mt-2" style="color:hsl(var(--muted-foreground));font-family:var(--font-mono);">
        mode · {{ deployment_mode }}
      </p>
    </div>

    {% if error %}
    <div class="text-sm border p-3"
         style="border-color:color-mix(in srgb, hsl(var(--destructive)) 40%, transparent);
                background:color-mix(in srgb, hsl(var(--destructive)) 8%, transparent);
                color:hsl(var(--destructive));">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <input type="hidden" name="next" value="{{ next }}" />
      <div>
        <label class="am-label block mb-2">Usuario</label>
        <input name="username" required
               class="w-full px-3 py-2 text-sm border border-border focus:outline-none focus:border-foreground transition-colors"
               style="background:hsl(var(--background));color:hsl(var(--foreground));" />
      </div>
      <div>
        <label class="am-label block mb-2">Password</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2 text-sm border border-border focus:outline-none focus:border-foreground transition-colors"
               style="background:hsl(var(--background));color:hsl(var(--foreground));" />
      </div>
      <button type="submit" class="am-btn w-full justify-center mt-2">
        Ingresar
        <span aria-hidden="true">→</span>
      </button>
    </form>
  </div>
</body>
</html>
